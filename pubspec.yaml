name: calculator
description: "A new Flutter project."
version: 3.1.6+9

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  math_expressions: ^2.7.0
  get_storage: ^2.1.1
  intl: ^0.20.2

  # Firebase — Android Vitals signal source (Crashlytics + Performance)
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_performance: ^0.10.0+8

  # Rating boost — Play Store review prompt
  in_app_review: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter:

  uses-material-design: true
  generate: true

# ============================================================
# Native splash screen (Android 12+ native API)
# Run: dart run flutter_native_splash:create
# ============================================================
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image: assets/logo/1024.png
  image_dark: assets/logo/1024.png
  android_12:
    image: assets/logo/1024.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/logo/1024.png
    icon_background_color_dark: "#000000"
  android: true
  ios: true
  web: false

# ============================================================
# Adaptive launcher icons
# Run: dart run flutter_launcher_icons
# ============================================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/1024.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/1024.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
